# Release pipeline for tabbify-service-supervisor.
#
# Builds the supervisord binary as a fully static Linux executable for BOTH
# CPU architectures and uploads each to a per-arch S3 key, so a fresh Ubuntu
# host (Kamatera x86_64, an aarch64 Lima VM, an ARM box, ...) can fetch and run
# the matching binary with a single curl invocation.
#
# Targets:
#   x86_64-unknown-linux-musl    (Intel/AMD hosts)
#   aarch64-unknown-linux-musl   (ARM hosts, e.g. an aarch64 Lima VM for
#                                 Firecracker testing)
# Each builds on a NATIVE runner for its arch (no cross-linker), so the build
# is identical to the other arch: rustup target add + musl-tools + cargo build.
#
# The mesh dependency (tabbify-service-mesh) is a PUBLIC https git dep, fetched
# anonymously by cargo — no deploy key / ssh-agent needed.
#
# ---------------------------------------------------------------------------
# REQUIRED REPO CONFIGURATION (Settings -> Secrets and variables -> Actions)
# ---------------------------------------------------------------------------
# Secrets:
#   AWS_ROLE_ARN      IAM role to assume via GitHub OIDC. The role's trust
#                     policy must allow this repo's GitHub OIDC provider,
#                     and its permission policy must grant s3:PutObject on
#                     the release bucket (e.g. arn:aws:s3:::<bucket>/supervisor/*).
#
# Variables:
#   AWS_REGION        AWS region of the bucket, e.g. eu-central-1.
#   RELEASE_S3_BUCKET Target bucket name (no s3:// prefix), e.g. tabbify-releases.
#
# ONE-TIME AWS SETUP (done by the repo owner, outside this workflow):
#   1. Create a GitHub OIDC identity provider in IAM:
#        Provider URL: https://token.actions.githubusercontent.com
#        Audience:     sts.amazonaws.com
#   2. Create an IAM role whose trust policy federates that provider and
#      restricts `token.actions.githubusercontent.com:sub` to this repo.
#   3. Attach a permission policy granting s3:PutObject on the bucket's
#      supervisor/ prefix (covers supervisor/<arch>/supervisord and the
#      legacy supervisor/supervisord key).
#   4. Put the role ARN in the AWS_ROLE_ARN secret and the bucket/region
#      in the variables above.
#
# ALTERNATIVE — static access keys instead of OIDC:
#   Replace the `role-to-assume` line in "Configure AWS credentials" with:
#       aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
#       aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
#   and drop the `permissions:` block below (only OIDC needs id-token: write).
# ---------------------------------------------------------------------------

name: release

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"

# Serialize release runs: two concurrent SSM redeploys raced docker
# compose mid-recreate on the serving box (2026-06-04: containers left
# Created-but-not-started, public API 504 until manual compose up).
# One release at a time; a newer queued run supersedes an older queued
# one (latest wins), the RUNNING one is never cancelled mid-deploy.
concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    # `id-token: write` is required for the OIDC handshake with AWS STS.
    # `contents: read` is the minimum needed to check out the repo.
    permissions:
      id-token: write
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Both arches are cross-compiled on a standard x86_64 runner via
          # cargo-zigbuild (zig supplies the cross-linker + C toolchain for the
          # musl targets), so no ARM runners are needed — those are not free on
          # private repos.
          - target: x86_64-unknown-linux-musl
            arch: x86_64
            # Docker platform for the per-arch image build (buildx).
            platform: linux/amd64
            # Back-compat: x86_64 also publishes to the legacy un-prefixed key
            # (consumed by the Phase-1 runbook + README curl examples). Leave
            # empty for the other arch.
            legacy_key: supervisor/supervisord
          - target: aarch64-unknown-linux-musl
            arch: aarch64
            platform: linux/arm64
            legacy_key: ""

    # NOTE (2026-06-11): temporarily back on ubuntu-latest to unblock the 1.4.40
    # release — the self-hosted `rust-runer` will be re-enabled once it runs on a
    # stable always-on box (the Mac Docker Desktop proved too flaky over hotspot).
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # The mesh dependency is a PUBLIC https git dep (tabbify-service-mesh) —
      # cargo fetches it anonymously, no SSH key / ssh-agent needed.

      - name: Install Rust stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Install zig (cross-linker for cargo-zigbuild)
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-zig-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-zig-${{ matrix.target }}-

      - name: Build static supervisord + tabbify-runner (cross-compiled via zig)
        # cargo-zigbuild uses `zig cc` as the linker, cross-linking the musl C
        # runtime for BOTH targets from one x86_64 runner. Builds the
        # orchestrator (supervisord) AND the per-app runner (tabbify-runner).
        run: cargo zigbuild --release --target "${{ matrix.target }}" --bin supervisord --bin tabbify-runner

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # OIDC: no long-lived keys stored in the repo. See header for the
          # access-key alternative if OIDC is not set up.
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload supervisord to S3 (per-arch key)
        run: |
          set -euo pipefail
          aws s3 cp \
            "target/${{ matrix.target }}/release/supervisord" \
            "s3://${{ vars.RELEASE_S3_BUCKET }}/supervisor/${{ matrix.arch }}/supervisord"

      - name: Upload tabbify-runner to S3 (per-arch key)
        # The per-app runner binary the orchestrator spawns. Same per-arch
        # scheme as supervisord; an operator host fetches both.
        run: |
          set -euo pipefail
          aws s3 cp \
            "target/${{ matrix.target }}/release/tabbify-runner" \
            "s3://${{ vars.RELEASE_S3_BUCKET }}/supervisor/${{ matrix.arch }}/tabbify-runner"

      - name: Derive SEMVER from tag
        id: ver
        run: |
          set -euo pipefail
          # The workflow runs on `v*` tags; strip the leading `v`. On a branch
          # push (main) fall back to the Cargo.toml package version so the job
          # still produces a deterministic versioned key.
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            SEMVER="${GITHUB_REF_NAME#v}"
          else
            SEMVER="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          fi
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"

      - name: Upload versioned binaries to S3
        # TAG-PUSH ONLY: a main push derives SEMVER from Cargo.toml, so an
        # unbumped main commit would silently OVERWRITE the already-released
        # supervisor/v<SEMVER>/<arch>/ binaries with different bytes while
        # `latest` keeps the original sha256 — every fresh install then dies
        # on "sha256 mismatch". Versioned keys are immutable per tag.
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          V="v${{ steps.ver.outputs.semver }}"
          BASE="s3://${{ vars.RELEASE_S3_BUCKET }}/supervisor/${V}/${{ matrix.arch }}"
          aws s3 cp "target/${{ matrix.target }}/release/supervisord"    "${BASE}/supervisord"
          aws s3 cp "target/${{ matrix.target }}/release/tabbify-runner" "${BASE}/tabbify-runner"

      - name: Upload the one-command installer
        # The installer resolves `latest` at run time, so it is version-
        # independent — refreshed on every push (not gated on tags). One
        # command on a clean systemd host:
        #   curl -fsSL <bucket>/supervisor/install | sudo sh
        if: matrix.arch == 'x86_64'
        run: |
          set -euo pipefail
          aws s3 cp scripts/install.sh \
            "s3://${{ vars.RELEASE_S3_BUCKET }}/supervisor/install" \
            --content-type text/x-shellscript

      - name: Upload supervisord to S3 (legacy un-prefixed key)
        # Only x86_64 sets legacy_key. Keeps the pre-existing
        # supervisor/supervisord key working for the Phase-1 runbook + any
        # other consumer that hasn't moved to the per-arch path yet.
        if: matrix.legacy_key != ''
        run: |
          set -euo pipefail
          aws s3 cp \
            "target/${{ matrix.target }}/release/supervisord" \
            "s3://${{ vars.RELEASE_S3_BUCKET }}/${{ matrix.legacy_key }}"

      # --- Turnkey Docker image (per-arch -> ghcr.io) --------------------------
      # Publishes the LEAN supervisor image (wasm + docker-via-socket). The
      # firecracker-capable image additionally bundles firecracker + a guest
      # kernel — a follow-up that stages those into deploy/bin before buildx
      # (see deploy/Dockerfile + deploy/README.md). First publish creates a
      # PRIVATE ghcr package; the owner makes it public for anonymous pulls.
      - name: Set up QEMU (cross-arch image build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Stage binaries into the image build context
        run: |
          set -euo pipefail
          mkdir -p deploy/bin
          cp "target/${{ matrix.target }}/release/supervisord"    deploy/bin/supervisord
          cp "target/${{ matrix.target }}/release/tabbify-runner" deploy/bin/tabbify-runner

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the per-arch supervisor image
        uses: docker/build-push-action@v6
        with:
          context: ./deploy
          file: ./deploy/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/tabbify-supervisor:${{ matrix.arch }}

      # Also push to ECR (private; AWS EC2 pulls via instance role — no PAT,
      # no public GHCR). x86_64-only: the coordinator EC2 is x86_64.
      - name: Log in to Amazon ECR
        if: matrix.arch == 'x86_64'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push to ECR (x86_64)
        if: matrix.arch == 'x86_64'
        uses: docker/build-push-action@v6
        with:
          context: ./deploy
          file: ./deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/tabbify-supervisor:latest
            ${{ steps.ecr.outputs.registry }}/tabbify-supervisor:${{ github.sha }}

      # A pushed `:latest`/`:<sha>` tag is mutable and ECR is eventually
      # consistent, so it may not be readable right after `docker push`. Resolve
      # the immutable content digest for the SHA tag and gate the redeploy on
      # it: no confirmed digest -> the helper exits non-zero and this job fails
      # BEFORE any redeploy fires. Requires `ecr:DescribeImages` on the CI role
      # (owned by the infra lane). x86_64-only: the coordinator EC2 is x86_64.
      - name: Confirm supervisor image digest
        if: matrix.arch == 'x86_64'
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -euo pipefail
          REPO_URI="${REGISTRY}/tabbify-supervisor"
          ENV_FILE="$(mktemp)"
          bash scripts/confirm-ecr-digest.sh \
            "${REPO_URI}" "${GITHUB_SHA}" "${ENV_FILE}" TABBIFY_SUPERVISOR_IMAGE
          # Surface the confirmed `repo@digest` to later steps so the SSM
          # redeploy can pin it into /opt/tabbify/.env.
          grep '^TABBIFY_SUPERVISOR_IMAGE=' "${ENV_FILE}" >> "${GITHUB_ENV}"

      # A pushed image is useless until the running container pulls it. Trigger
      # the redeploy on the SERVING host via SSM send-command — no SSH, no
      # static keys (the instance role carries SSM managed-node perms; this CI
      # role carries ssm:SendCommand). The supervisor runs as the `supervisor`
      # service in the same compose project on that host. This step only runs
      # after the digest-confirm gate above passed. x86_64-only.
      - name: Redeploy supervisor via SSM
        if: matrix.arch == 'x86_64'
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          # Confirmed `repo@digest` from the digest-confirm step above. This step
          # only runs after that gate passed, so the value is always set.
          SUPERVISOR_IMAGE: ${{ env.TABBIFY_SUPERVISOR_IMAGE }}
        run: |
          set -euo pipefail
          # NOTE: SSM AWS-RunShellScript runs this with /bin/sh (dash on Ubuntu),
          # so it must be POSIX — no `pipefail`. `set -eu` still aborts on a
          # failed `docker login`.
          # We pin TABBIFY_SUPERVISOR_IMAGE to the confirmed immutable digest in
          # /opt/tabbify/.env; compose references ${TABBIFY_SUPERVISOR_IMAGE:-<default>}
          # (fallback added by the infra lane), so the host pulls the exact
          # digest CI confirmed rather than the mutable :latest tag.
          DEPLOY_SCRIPT=$(cat <<EOF
          set -eu
          aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${REGISTRY}
          cd /opt/tabbify
          touch .env
          grep -v '^TABBIFY_SUPERVISOR_IMAGE=' .env > .env.next || true
          printf 'TABBIFY_SUPERVISOR_IMAGE=%s\n' "${SUPERVISOR_IMAGE}" >> .env.next
          mv .env.next .env
          docker compose pull && docker compose up -d
          EOF
          )
          CMD_ID=$(aws ssm send-command \
            --region "${AWS_REGION}" \
            --document-name AWS-RunShellScript \
            --targets "Key=tag:Name,Values=tabbify-serving" \
            --comment "redeploy supervisor ${GITHUB_SHA::7}" \
            --parameters "$(jq -n --arg s "$DEPLOY_SCRIPT" '{commands:[$s]}')" \
            --query Command.CommandId --output text)
          echo "SSM CommandId=${CMD_ID}"
          for _ in $(seq 1 30); do
            sleep 10
            STATUS=$(aws ssm list-command-invocations --region "${AWS_REGION}" \
              --command-id "${CMD_ID}" --details \
              --query "CommandInvocations[0].Status" --output text 2>/dev/null || echo Pending)
            echo "redeploy status: ${STATUS}"
            case "${STATUS}" in
              Success) echo "supervisor redeployed"; exit 0 ;;
              Failed|Cancelled|TimedOut|"Delivery Timed Out")
                echo "redeploy ended: ${STATUS}"
                aws ssm list-command-invocations --region "${AWS_REGION}" --command-id "${CMD_ID}" \
                  --details --query "CommandInvocations[0].CommandPlugins[0].Output" --output text || true
                exit 1 ;;
            esac
          done
          echo "timed out waiting for SSM redeploy"; exit 1

  # After both per-arch images are pushed, stitch them into one multi-arch
  # `:latest` manifest so `docker run ghcr.io/tabbify-io/tabbify-supervisor`
  # pulls the right arch automatically.
  # `latest` is published ONLY after BOTH arch legs uploaded their versioned
  # binaries (needs: the whole matrix) — otherwise an aarch64 host installing
  # in the release window resolves `latest` and 404s on its binary. The job
  # re-downloads the uploaded binaries to hash them, and publishes BOTH the
  # plain keys (x86_64 — the historical shape every deployed engine reads)
  # and `<bin>_aarch64` keys (read by arch-aware engines + the installer).
  # TAG-PUSH ONLY: a main push must never move `latest` (see the v1.4.10
  # clobber incident).
  publish-latest:
    needs: build-and-release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Publish supervisor/latest manifest (all arches present)
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME}"
          BUCKET="${{ vars.RELEASE_S3_BUCKET }}"
          mkdir -p /tmp/rel
          for arch in x86_64 aarch64; do
            for bin in supervisord tabbify-runner; do
              aws s3 cp "s3://${BUCKET}/supervisor/${V}/${arch}/${bin}" "/tmp/rel/${bin}.${arch}"
            done
          done
          TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq -nc \
            --arg v "$V" --arg ts "$TS" \
            --arg sup_x   "$(sha256sum /tmp/rel/supervisord.x86_64     | cut -d' ' -f1)" \
            --arg run_x   "$(sha256sum /tmp/rel/tabbify-runner.x86_64  | cut -d' ' -f1)" \
            --arg sup_a   "$(sha256sum /tmp/rel/supervisord.aarch64    | cut -d' ' -f1)" \
            --arg run_a   "$(sha256sum /tmp/rel/tabbify-runner.aarch64 | cut -d' ' -f1)" \
            '{latest:$v, versions:[$v],
              sha256:{supervisord:$sup_x, "tabbify-runner":$run_x,
                      supervisord_aarch64:$sup_a, "tabbify-runner_aarch64":$run_a},
              ts:$ts}' > /tmp/latest.json
          aws s3 cp /tmp/latest.json "s3://${BUCKET}/supervisor/latest" --content-type application/json
          echo "published:"; cat /tmp/latest.json

  publish-image-manifest:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create the multi-arch :latest manifest
        run: |
          set -euo pipefail
          IMG="ghcr.io/${{ github.repository_owner }}/tabbify-supervisor"
          docker buildx imagetools create -t "$IMG:latest" \
            "$IMG:x86_64" "$IMG:aarch64"
