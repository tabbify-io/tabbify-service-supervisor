# Release pipeline for tabbify-service-supervisor.
#
# Builds the supervisord binary as a fully static Linux executable
# (x86_64-unknown-linux-musl) and uploads it to S3, so a fresh Ubuntu
# Kamatera host can fetch and run it with a single curl invocation.
#
# The supervisor's Cargo.toml depends on mesh-joiner via an SSH git dep
# (ssh://git@github.com/tabbify-io/tabbify-service-mesh.git). Because
# .cargo/config.toml sets net.git-fetch-with-cli=true, cargo's git fetch
# runs through the system SSH binary. A deploy key (read-only SSH key for
# tabbify-service-mesh) must therefore be loaded into ssh-agent BEFORE
# the build step.
#
# ---------------------------------------------------------------------------
# REQUIRED REPO CONFIGURATION (Settings -> Secrets and variables -> Actions)
# ---------------------------------------------------------------------------
# Secrets:
#   MESH_DEPLOY_KEY   Read-only SSH private key for tabbify-service-mesh.
#                     The corresponding public key must be added as a deploy
#                     key on the tabbify-service-mesh repo (read-only access).
#
#   AWS_ROLE_ARN      IAM role to assume via GitHub OIDC. The role's trust
#                     policy must allow this repo's GitHub OIDC provider,
#                     and its permission policy must grant s3:PutObject on
#                     the release bucket (e.g. arn:aws:s3:::<bucket>/supervisor/*).
#
# Variables:
#   AWS_REGION        AWS region of the bucket, e.g. eu-central-1.
#   RELEASE_S3_BUCKET Target bucket name (no s3:// prefix), e.g. tabbify-releases.
#
# ONE-TIME AWS SETUP (done by the repo owner, outside this workflow):
#   1. Create a GitHub OIDC identity provider in IAM:
#        Provider URL: https://token.actions.githubusercontent.com
#        Audience:     sts.amazonaws.com
#   2. Create an IAM role whose trust policy federates that provider and
#      restricts `token.actions.githubusercontent.com:sub` to this repo.
#   3. Attach a permission policy granting s3:PutObject on the bucket's
#      supervisor/ prefix.
#   4. Put the role ARN in the AWS_ROLE_ARN secret and the bucket/region
#      in the variables above.
#
# ALTERNATIVE — static access keys instead of OIDC:
#   Replace the `role-to-assume` line in "Configure AWS credentials" with:
#       aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
#       aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
#   and drop the `permissions:` block below (only OIDC needs id-token: write).
# ---------------------------------------------------------------------------

name: release

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"

env:
  # musl gives us a static binary that runs on any modern Linux without a
  # matching libc. reqwest uses rustls (no OpenSSL C linkage), so musl
  # builds cleanly.
  TARGET: x86_64-unknown-linux-musl
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    # `id-token: write` is required for the OIDC handshake with AWS STS.
    # `contents: read` is the minimum needed to check out the repo.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Load the mesh deploy key into ssh-agent BEFORE the build.
      # The supervisor's Cargo.toml references mesh-joiner via an SSH git dep
      # and .cargo/config.toml sets net.git-fetch-with-cli=true, so cargo's
      # git fetch is routed through the system ssh binary and requires a key
      # that authenticates to github.com/tabbify-io/tabbify-service-mesh.
      - name: Load mesh deploy key into ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MESH_DEPLOY_KEY }}

      - name: Install Rust stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${TARGET}"

      - name: Install musl build tools
        # musl-gcc is needed to link the static C runtime for the musl target.
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ env.TARGET }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.TARGET }}-

      - name: Build static supervisord binary
        run: cargo build --release --target "${TARGET}" --bin supervisord

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # OIDC: no long-lived keys stored in the repo. See header for the
          # access-key alternative if OIDC is not set up.
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload supervisord to S3
        run: |
          set -euo pipefail
          aws s3 cp \
            "target/${TARGET}/release/supervisord" \
            "s3://${{ vars.RELEASE_S3_BUCKET }}/supervisor/supervisord"
